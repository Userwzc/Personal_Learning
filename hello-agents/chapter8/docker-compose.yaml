services:
  # --- Qdrant 服务 ---
  qdrant:
    image: qdrant/qdrant
    container_name: qdrant
    restart: always
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_storage:/qdrant/storage:z

  # --- Neo4j 服务 ---
  neo4j:
    image: neo4j:2025.11.2
    container_name: neo4j
    restart: always
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/hello-agents-password
    volumes:
      - ./neo4j_data:/data

